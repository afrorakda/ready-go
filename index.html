<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ready Go - Fridge Combo</title>
    
    <link rel="apple-touch-icon" href="image_45.png">
    <link rel="icon" type="image/png" href="image_45.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #fafafa;
            --radius: 15px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: var(--main);
            /* SafeArea */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 全要素消滅用のオーバレイ */
        #done-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--main); /* 画面反転（真っ黒に） */
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg);
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        #done-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        header {
            padding: 20px;
            text-align: left;
            border-bottom: 1px solid var(--accent);
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 800;
            margin: 0;
        }
        .subtitle {
            font-size: 0.8rem;
            color: #999;
            margin: 2px 0 0 0;
        }

        /* モード切り替えスイッチ */
        .mode-switch {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            background: var(--accent);
            justify-content: center;
        }
        .mode-btn {
            background: none;
            border: 2px solid var(--main);
            color: var(--main);
            padding: 5px 15px;
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: var(--main);
            color: var(--bg);
        }

        /* メインのリストエリア */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        #item-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2カラム */
            gap: 15px;
        }

        .item {
            background: #fff;
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: opacity 0.3s ease, background 0.2s;
            cursor: pointer;
        }
        
        /* 点灯式（アクティブ） */
        .item.active {
            border-color: var(--main);
            background: #fff;
        }
        
        /* 消し込み（チェック済み） */
        .item.checked {
            opacity: 0.2; /* 極限まで薄く */
            background: var(--accent);
        }

        .item-info {
            display: flex;
            flex-direction: column;
        }
        
        .item-name {
            font-size: 0.9rem;
            font-weight: 700;
        }
        
        .item-icon {
            font-size: 1.2rem;
            margin-right: 10px;
        }

        /* Custom Slot用入力欄 */
        .custom-input {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--main);
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--main);
            background: transparent;
            padding: 2px 0;
            margin-top: 5px;
            
            /* iOS Fix */
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
        }
        .custom-input:focus {
            outline: none;
        }

        footer {
            padding: 10px 0 20px 0;
            text-align: center;
            background-color: var(--bg);
            border-top: 1px solid var(--accent);
            margin-bottom: env(safe-area-inset-bottom);
        }

        .kofi-button {
            display: inline-block;
            text-decoration: none;
            color: var(--main);
            background: var(--accent);
            padding: 8px 16px;
            border-radius: var(--radius);
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .add-home {
            font-size: 10px;
            color: #999;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="done-overlay">DONE. GO!</div>

    <header>
        <h1>Ready Go</h1>
        <p class="subtitle">1. Set items, 2. Check and Exit.</p>
    </header>

    <div class="mode-switch">
        <button class="mode-btn active" onclick="setMode('daily')">Daily</button>
        <button class="mode-btn" onclick="setMode('travel')">Travel</button>
    </div>

    <main>
        <div id="item-list">
            </div>
    </main>

    <footer>
        <div class="add-home">Add image_45 to home screen for instant check.</div>
        <a href="https://ko-fi.com/afrorakda" class="kofi-button">☕️buy me a coffee</a>
        <div style="font-size: 9px; color: #aaa;">afrorakda © 2026</div>
    </footer>

    <script>
        // プリセット・データ案
        const dailyItems = [
            { id: 'd1', name: 'Wallet', icon: '🪪' },
            { id: 'd2', name: 'Keys', icon: '🔑' },
            { id: 'd3', name: 'Smartphone', icon: '📱' },
            { id: 'd4', name: 'Earbuds', icon: '🎧' },
            { id: 'd5', name: 'Watch', icon: '⌚️' },
            { id: 'custom_d1', name: 'Custom 1', icon: '✏️', custom: true },
            { id: 'custom_d2', name: 'Custom 2', icon: '✏️', custom: true }
        ];

        const travelItems = [
            { id: 't1', name: 'Passport', icon: '🛂' },
            { id: 't2', name: 'Tickets', icon: '🎟️' },
            { id: 't3', name: 'Charger', icon: '🔌' },
            { id: 't4', name: 'Medicine', icon: '💊' },
            { id: 't5', name: 'Cash', icon: '💵' },
            { id: 'custom_t1', name: 'Custom 1', icon: '✏️', custom: true },
            { id: 'custom_t2', name: 'Custom 2', icon: '✏️', custom: true }
        ];

        let currentMode = 'daily';
        // アクティブ状態（点灯）とチェック状態（消し込み）を管理
        let activeItems = JSON.parse(localStorage.getItem('readygo_active')) || {};
        let customNames = JSON.parse(localStorage.getItem('readygo_custom')) || {};
        let checkedItems = {}; // リロードでリセット

        const itemList = document.getElementById('item-list');
        const overlay = document.getElementById('done-overlay');

        function setMode(mode) {
            currentMode = mode;
            // ボタンのスタイル切り替え
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderItems();
        }

        function renderItems() {
            itemList.innerHTML = '';
            const items = currentMode === 'daily' ? dailyItems : travelItems;
            
            // チェック済みの項目をリセット（モード切り替え時）
            checkedItems = {};

            items.forEach(item => {
                const isActive = activeItems[item.id] || false;
                const isChecked = checkedItems[item.id] || false;
                
                const itemDiv = document.createElement('div');
                itemDiv.className = `item ${isActive ? 'active' : ''} ${isChecked ? 'checked' : ''}`;
                
                // Custom Slotの対応
                const displayName = item.custom ? (customNames[item.id] || item.name) : item.name;
                
                itemDiv.innerHTML = `
                    <div class="item-info">
                        ${item.custom ? `
                            <span class="item-name">${item.icon}</span>
                            <input type="text" class="custom-input" placeholder="Type here" value="${customNames[item.id] || ''}" onchange="saveCustomName('${item.id}', this.value)" onclick="event.stopPropagation()">
                        ` : `
                            <span class="item-name">${item.icon} ${displayName}</span>
                        `}
                    </div>
                `;

                // クリック時の挙動（点灯/消し込み）
                itemDiv.addEventListener('click', () => handleItemClick(item.id, isActive));
                
                itemList.appendChild(itemDiv);
            });
        }

        function handleItemClick(id, isActive) {
            if (!isActive) {
                // 点灯式（アクティブにする）
                activeItems[id] = true;
                localStorage.setItem('readygo_active', JSON.stringify(activeItems));
            } else {
                // 消し込み（チェック済み、または未チェック）
                if (checkedItems[id]) {
                    delete checkedItems[id];
                } else {
                    checkedItems[id] = true;
                }
            }
            renderItems();
            checkCompletion();
        }

        function saveCustomName(id, name) {
            customNames[id] = name;
            localStorage.setItem('readygo_custom', JSON.stringify(customNames));
            renderItems(); // 再レンダリングして反映
        }

        function checkCompletion() {
            // 現在のモードでアクティブな項目のリスト
            const currentItems = currentMode === 'daily' ? dailyItems : travelItems;
            const targetIds = currentItems.filter(item => activeItems[item.id]).map(item => item.id);
            
            // アクティブな項目が0個の場合はDONEにならない
            if (targetIds.length === 0) return;

            // アクティブな項目がすべてチェック済みか確認
            const allChecked = targetIds.every(id => checkedItems[id]);

            if (allChecked) {
                // --- THE FINALE: DONE. GO! ---
                overlay.classList.add('show');
                // 3秒後にリセットして元に戻す（実用的には閉じるが、テスト用）
                setTimeout(() => {
                    overlay.classList.remove('show');
                    checkedItems = {}; // チェックをリセット
                    renderItems();
                }, 3000);
            }
        }

        // 初期ロード
        renderItems();
    </script>
</body>
</html>
