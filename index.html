<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ready Go</title>
    
    <link rel="icon" href="image_45.png">
    <link rel="apple-touch-icon" href="image_45.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --danger: #ff4d4d;
        }

        /* 憲法遵守: 15px角丸 / iOS Safari対策 / 選択禁止 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        
        input, textarea, button {
            -webkit-appearance: none;
            opacity: 1 !important;
            -webkit-text-fill-color: var(--main);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 60px) 20px;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -1.2px; }
        .hub-link { text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main); background: var(--accent); padding: 8px 14px; border-radius: var(--radius); }
        
        .subtitle { font-size: 0.85rem; color: #666; font-weight: 700; }

        /* Preview Window */
        #stage {
            min-height: 250px;
            background: var(--input-bg);
            border-radius: var(--radius);
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 10px;
            padding: 15px;
            border: 2px solid var(--accent);
        }
        .preview-thumb {
            width: calc(33.33% - 7px);
            aspect-ratio: 1;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--accent);
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Setup Area */
        .setup-section {
            background: var(--input-bg);
            border-radius: var(--radius);
            padding: 18px;
            border: 2px solid var(--accent);
        }
        .setup-title { font-size: 0.75rem; font-weight: 900; color: #999; margin-bottom: 12px; }
        
        .camera-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .cam-btn {
            background: #fff; border: 2px solid var(--accent); border-radius: var(--radius);
            padding: 15px 0; display: flex; flex-direction: column; align-items: center; gap: 5px;
            cursor: pointer; transition: 0.2s;
        }
        .cam-btn:active { background: var(--accent); }
        .cam-btn span { font-size: 1.5rem; }
        .cam-btn label { font-size: 0.6rem; font-weight: 900; color: #999; pointer-events: none; }
        .cam-btn.done { opacity: 0.2; pointer-events: none; border-style: dashed; }

        .go-btn {
            width: 100%; padding: 20px; background: var(--main);
            color: #fff; border: none; border-radius: var(--radius);
            font-size: 1.2rem; font-weight: 900; cursor: pointer;
            -webkit-text-fill-color: #fff;
        }

        /* Destruction Overlay */
        #destruct-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .destruct-card {
            width: 100%; max-width: 350px; background: #fff; border-radius: var(--radius);
            padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center;
        }
        .destruct-img { width: 100%; aspect-ratio: 1; border-radius: 10px; object-fit: cover; margin-bottom: 20px; }
        
        /* 激震アニメーション */
        .heavy-shake { animation: shake 0.1s infinite; border: 4px solid var(--danger); }
        @keyframes shake { 0%{transform:translate(2px,2px)} 50%{transform:translate(-2px,-2px)} 100%{transform:translate(2px,-2px)} }

        /* ホワイトアウト (THE VOID) */
        #void-screen {
            position: fixed; inset: 0; background: #fff; z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px;
        }
        .void-msg { font-size: 2.5rem; font-weight: 900; line-height: 1.1; margin-bottom: 20px; }
        .void-time { font-size: 1rem; font-weight: 800; color: #999; }
        .reset-trigger { margin-top: 100px; font-size: 0.7rem; color: #eee; background: none; border: none; }

        /* 鉄壁フッター */
        footer { text-align: center; font-size: 0.75rem; color: #999; line-height: 1.6; font-weight: 700; margin-top: 30px; }
        footer a { color: inherit; text-decoration: underline; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; width: 90%; max-width: 340px; padding: 35px; border-radius: var(--radius); position: relative; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div id="destruct-overlay">
    <div class="destruct-card" id="current-card">
        <img id="target-img" class="destruct-img" src="">
        <button class="go-btn" style="background:var(--danger);" onclick="destroyCurrent()">DESTROY & CONFIRM</button>
    </div>
</div>

<div id="void-screen">
    <div class="void-msg">ALL DONE.<br>Ready GO.</div>
    <div id="final-time" class="void-time"></div>
    <button class="reset-trigger" ontouchstart="startResetTimer()" ontouchend="clearResetTimer()">HOLD TO RESET RITUAL</button>
</div>

<div class="container" id="main-ui">
    <header>
        <h1>Ready Go</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">Capture evidence. Destroy memory.</p>

    <div id="stage">
        <div id="empty-msg" style="width:100%; text-align:center; padding-top:100px; color:#ccc; font-weight:800; font-size:0.8rem;">NO EVIDENCE CAPTURED</div>
    </div>

    <div class="setup-section">
        <p class="setup-title">CAPTURE RITUAL</p>
        <div class="camera-grid">
            <div class="cam-btn" onclick="triggerCam('fire')"><span>🔥</span><label>FIRE</label></div>
            <div class="cam-btn" onclick="triggerCam('water')"><span>💧</span><label>WATER</label></div>
            <div class="cam-btn" onclick="triggerCam('lock')"><span>🔒</span><label>LOCK</label></div>
            <div class="cam-btn" onclick="triggerCam('window')"><span>🪟</span><label>WINDOW</label></div>
            <div class="cam-btn" onclick="triggerCam('plug')"><span>🔌</span><label>PLUG</label></div>
            <div class="cam-btn" onclick="triggerCam('etc')"><span>📷</span><label>OTHER</label></div>
        </div>
        <input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none;">
        <button class="go-btn" id="ready-btn" onclick="startDestruction()" style="display:none;">READY TO GO</button>
    </div>

    <button class="hub-link" style="background:var(--accent); border:none; padding:15px; cursor:pointer;" onclick="showModal()">Add to Home Screen</button>

    <footer>
        <span id="footer-text">No login / No tracking / No ads / Browser only</span><br>
        <a id="privacy-link" href="https://afrorakda.com/privacy/">Privacy Policy</a> / <span id="copyright">afrorakda © 2026</span><br>
        <a id="kofi-link" href="https://ko-fi.com/afrorakda" target="_blank" style="text-decoration:none;">☕️ buy me a coffee</a>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 id="modal-title" style="margin-bottom: 15px; font-weight: 900;">📱 Install</h3>
        <p id="modal-body" style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">Share > Add to Home Screen</p>
    </div>
</div>

<script>
    let capturedImages = [];
    let currentDestructIndex = 0;
    let resetTimer;

    const camInput = document.getElementById('cam-input');
    const stage = document.getElementById('stage');
    const readyBtn = document.getElementById('ready-btn');

    function triggerCam(type) {
        camInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = event.target.result;
                capturedImages.push(data);
                renderThumb(data);
                if (type !== 'etc') {
                    // 他以外のアイコンは一度撮ったら無効化
                    const btns = document.querySelectorAll('.cam-btn');
                    btns.forEach(b => { if(b.innerText.includes(getEmoji(type))) b.classList.add('done'); });
                }
                readyBtn.style.display = 'block';
                document.getElementById('empty-msg').style.display = 'none';
            };
            reader.readAsDataURL(file);
        };
        camInput.click();
    }

    function getEmoji(type) {
        return {fire:'🔥', water:'💧', lock:'🔒', window:'🪟', plug:'🔌'}[type] || '📷';
    }

    function renderThumb(src) {
        const div = document.createElement('div');
        div.className = 'preview-thumb';
        div.innerHTML = `<img src="${src}">`;
        stage.appendChild(div);
    }

    function startDestruction() {
        if (capturedImages.length === 0) return;
        currentDestructIndex = 0;
        document.getElementById('destruct-overlay').style.display = 'flex';
        showNextTarget();
    }

    function showNextTarget() {
        if (currentDestructIndex >= capturedImages.length) {
            finishEverything();
            return;
        }
        document.getElementById('target-img').src = capturedImages[currentDestructIndex];
        document.getElementById('current-card').classList.remove('heavy-shake');
    }

    function destroyCurrent() {
        const card = document.getElementById('current-card');
        card.classList.add('heavy-shake');
        if (window.navigator.vibrate) window.navigator.vibrate([50, 30, 100]);

        setTimeout(() => {
            currentDestructIndex++;
            showNextTarget();
        }, 600);
    }

    function finishEverything() {
        const now = new Date();
        const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
        
        document.getElementById('void-screen').style.display = 'flex';
        document.getElementById('final-time').innerText = timeStr;
        document.getElementById('destruct-overlay').style.display = 'none';
        
        // メモリ解放（データの揮発）
        capturedImages = [];
    }

    // リセットタイマー（誤操作防止）
    function startResetTimer() {
        resetTimer = setTimeout(() => {
            location.reload();
        }, 2000);
    }
    function clearResetTimer() { clearTimeout(resetTimer); }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    // 鉄壁フッター：聖域ロジック
    async function loadFooter() {
        try {
            const res = await fetch('footer.json');
            if (res.ok) {
                const d = await res.json();
                if (d.footerText) document.getElementById('footer-text').innerText = d.footerText;
                if (d.privacyLink) document.getElementById('privacy-link').href = d.privacyLink;
                if (d.copyright) document.getElementById('copyright').innerText = d.copyright;
                if (d.kofiText) document.getElementById('kofi-link').innerText = d.kofiText;
                if (d.modalTitle) document.getElementById('modal-title').innerText = d.modalTitle;
                if (d.modalBody) document.getElementById('modal-body').innerHTML = d.modalBody;
            }
        } catch (e) {
            console.log("Using hardcoded footer defaults.");
        }
    }

    loadFooter();
</script>
</body>
</html>
