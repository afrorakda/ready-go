<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ready Go - Fridge Combo</title>
    
    <link rel="apple-touch-icon" href="image_45.png">
    <link rel="icon" type="image/png" href="image_45.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #fafafa;
            --radius: 15px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* The Finale Overlay */
        #done-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--main);
            display: flex; align-items: center; justify-content: center;
            color: var(--bg); font-size: 3.5rem; font-weight: 900;
            z-index: 2000; opacity: 0; visibility: hidden;
            transition: 0.3s;
        }
        #done-overlay.show { opacity: 1; visibility: visible; }

        header { padding: 20px; border-bottom: 1px solid var(--accent); }
        h1 { font-size: 1.4rem; font-weight: 800; margin: 0; }
        
        /* Step & Mode Navigation */
        .nav-bar {
            display: flex; flex-direction: column; gap: 10px;
            padding: 10px 20px; background: var(--accent);
        }
        .segmented-control {
            display: flex; background: #eee; border-radius: 10px; padding: 2px;
        }
        .seg-btn {
            flex: 1; border: none; background: none; padding: 8px;
            font-size: 0.8rem; font-weight: bold; border-radius: 8px;
            cursor: pointer;
        }
        .seg-btn.active { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .phase-switch {
            display: flex; justify-content: center; gap: 10px;
        }
        .phase-btn {
            flex: 1; padding: 12px; border-radius: var(--radius);
            border: 2px solid var(--main); font-weight: 800; font-size: 0.9rem;
            background: #fff; cursor: pointer;
        }
        .phase-btn.active { background: var(--main); color: #fff; }

        /* Item Grid */
        main { flex: 1; overflow-y: auto; padding: 20px; }
        #item-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
        }

        .item {
            background: #fff; border: 2px solid var(--accent);
            border-radius: var(--radius); padding: 15px;
            display: flex; flex-direction: column; gap: 5px;
            transition: 0.2s; cursor: pointer;
        }

        /* Setup Phase States */
        body.setup-phase .item.selected { border-color: var(--main); }
        body.setup-phase .item:not(.selected) { opacity: 0.4; }

        /* Ready Phase States */
        body.ready-phase .item:not(.selected) { display: none; }
        body.ready-phase .item.checked { opacity: 0.1; background: var(--accent); border-color: transparent; }

        .item-label { font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 5px; }
        
        .custom-input {
            width: 100%; border: none; border-bottom: 1px solid #ddd;
            font-size: 0.85rem; font-weight: 700; background: transparent;
            padding: 2px 0; outline: none;
            /* iOS Fix */
            -webkit-appearance: none; -webkit-text-fill-color: var(--main); opacity: 1 !important;
        }
        .custom-input::placeholder { color: #bbb; font-weight: 400; }

        footer {
            padding: 15px 0; text-align: center; background: var(--bg);
            border-top: 1px solid var(--accent);
            margin-bottom: env(safe-area-inset-bottom);
        }
        .kofi-button {
            display: inline-block; text-decoration: none; color: var(--main);
            background: var(--accent); padding: 8px 16px; border-radius: var(--radius);
            font-weight: bold; font-size: 12px; margin-bottom: 8px;
        }
        .credits { font-size: 9px; color: #aaa; }
    </style>
</head>
<body class="setup-phase">

<div id="done-overlay" onclick="resetAll()">DONE. GO!</div>

<header>
    <h1>Ready Go</h1>
</header>

<div class="nav-bar">
    <div class="segmented-control">
        <button id="btn-daily" class="seg-btn active" onclick="changeMode('daily')">DAILY</button>
        <button id="btn-travel" class="seg-btn" onclick="changeMode('travel')">TRAVEL</button>
    </div>
    <div class="phase-switch">
        <button id="phase-setup" class="phase-btn active" onclick="setPhase('setup')">1. SETUP</button>
        <button id="phase-ready" class="phase-btn" onclick="setPhase('ready')">2. READY</button>
    </div>
</div>

<main>
    <div id="item-grid"></div>
</main>

<footer>
    <a href="https://ko-fi.com/afrorakda" class="kofi-button">☕️buy me a coffee</a>
    <div class="credits">No login / No tracking / No ads / Browser only / afrorakda © 2026</div>
</footer>

<script>
    const itemsData = {
        daily: [
            {id:'d1', n:'Wallet', i:'🪪'}, {id:'d2', n:'Keys', i:'🔑'},
            {id:'d3', n:'Smartphone', i:'📱'}, {id:'d4', n:'Earbuds', i:'🎧'},
            {id:'d5', n:'Watch', i:'⌚️'},
            {id:'dc1', n:'Custom 1', i:'✏️', c:true}, {id:'dc2', n:'Custom 2', i:'✏️', c:true}
        ],
        travel: [
            {id:'t1', n:'Passport', i:'🛂'}, {id:'t2', n:'Tickets', i:'🎟️'},
            {id:'t3', n:'Charger', i:'🔌'}, {id:'t4', n:'Medicine', i:'💊'},
            {id:'t5', n:'Cash', i:'💵'},
            {id:'tc1', n:'Custom 1', i:'✏️', c:true}, {id:'tc2', n:'Custom 2', i:'✏️', c:true}
        ]
    };

    let mode = 'daily';
    let phase = 'setup';
    let selected = JSON.parse(localStorage.getItem('rg_sel')) || {};
    let customs = JSON.parse(localStorage.getItem('rg_cus')) || {};
    let checked = {};

    function changeMode(m) {
        mode = m;
        document.getElementById('btn-daily').classList.toggle('active', m==='daily');
        document.getElementById('btn-travel').classList.toggle('active', m==='travel');
        render();
    }

    function setPhase(p) {
        phase = p;
        document.body.className = p + '-phase';
        document.getElementById('phase-setup').classList.toggle('active', p==='setup');
        document.getElementById('phase-ready').classList.toggle('active', p==='ready');
        checked = {}; // モード切替時にチェックリセット
        render();
    }

    function render() {
        const grid = document.getElementById('item-grid');
        grid.innerHTML = '';
        itemsData[mode].forEach(item => {
            const isSel = selected[item.id];
            const isChk = checked[item.id];
            const div = document.createElement('div');
            div.className = `item ${isSel?'selected':''} ${isChk?'checked':''}`;
            
            let content = `<div class="item-label"><span>${item.i}</span>`;
            if(item.c) {
                content += `<input type="text" class="custom-input" placeholder="Custom..." 
                            value="${customs[item.id]||''}" 
                            onchange="saveCustom('${item.id}', this.value)" 
                            onclick="event.stopPropagation()">`;
            } else {
                content += `<span>${item.n}</span>`;
            }
            content += `</div>`;
            div.innerHTML = content;

            div.onclick = () => {
                if(phase === 'setup') {
                    selected[item.id] = !selected[item.id];
                    localStorage.setItem('rg_sel', JSON.stringify(selected));
                } else {
                    if(selected[item.id]) {
                        checked[item.id] = !checked[item.id];
                        check();
                    }
                }
                render();
            };
            grid.appendChild(div);
        });
    }

    function saveCustom(id, val) {
        customs[id] = val;
        localStorage.setItem('rg_cus', JSON.stringify(customs));
    }

    function check() {
        const activeOnes = itemsData[mode].filter(i => selected[i.id]);
        if(activeOnes.length > 0 && activeOnes.every(i => checked[i.id])) {
            document.getElementById('done-overlay').classList.add('show');
        }
    }

    function resetAll() {
        document.getElementById('done-overlay').classList.remove('show');
        checked = {};
        render();
    }

    render();
</script>
</body>
</html>
