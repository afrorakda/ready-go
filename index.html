<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ready Go</title>
    
    <link rel="icon" href="image_45.png">
    <link rel="apple-touch-icon" href="image_45.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --danger: #ff4d4d;
        }

        /* 憲法遵守: 15px角丸 / iOS Safari対策 / 選択禁止 */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        
        input, textarea, button {
            -webkit-appearance: none;
            opacity: 1 !important;
            -webkit-text-fill-color: var(--main);
            border-radius: var(--radius);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
            overflow: hidden; /* クールダウン中の逃げ場をなくす */
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            z-index: 10;
        }

        /* ヘッダー: Hub連携 */
        header { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -1.2px; }
        .hub-link { text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main); background: var(--accent); padding: 8px 14px; border-radius: var(--radius); }
        
        .subtitle { font-size: 0.85rem; color: #666; font-weight: 700; }

        /* Stage Area (一極集中) */
        #stage {
            min-height: 380px;
            background: var(--input-bg);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border: 2px solid var(--accent);
            position: relative;
        }

        .ritual-card {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .visual-box {
            width: 200px; height: 200px;
            background: #fff;
            border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .visual-box img { width: 100%; height: 100%; object-fit: cover; }

        .label-text { font-size: 1.4rem; font-weight: 900; letter-spacing: 1px; }

        /* 破壊演出 */
        .shaking { animation: heavyShake 0.1s infinite; border: 4px solid var(--danger); }
        @keyframes heavyShake {
            0% { transform: translate(3px, 3px) rotate(0deg); }
            50% { transform: translate(-3px, -3px) rotate(1deg); }
            100% { transform: translate(3px, -3px) rotate(-1deg); }
        }

        /* 全画面ホワイトアウト (断絶) */
        #the-void {
            position: fixed; inset: 0; background: #fff;
            z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }
        #void-msg { font-size: 3.5rem; font-weight: 900; color: var(--main); margin-bottom: 20px; }
        .void-sub { font-size: 1rem; font-weight: 700; color: #999; }

        /* Setup Area */
        .setup-section { background: var(--input-bg); border-radius: var(--radius); padding: 18px; border: 2px solid var(--accent); }
        .preset-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .preset-icon { 
            font-size: 1.4rem; background: #fff; border: 2px solid var(--accent); 
            border-radius: 10px; padding: 10px 0; text-align: center; cursor: pointer; opacity: 0.3; 
        }
        .preset-icon.active { opacity: 1; border-color: var(--main); border-width: 2px; }

        .go-btn {
            width: 100%; padding: 22px; background: var(--main);
            color: #fff; border: none; border-radius: var(--radius);
            font-size: 1.3rem; font-weight: 900; cursor: pointer;
            -webkit-text-fill-color: #fff;
        }

        /* 聖域フッター */
        footer { text-align: center; font-size: 0.75rem; color: #999; line-height: 1.6; font-weight: 700; margin-top: 15px; }
        footer a { color: inherit; text-decoration: underline; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; width: 90%; max-width: 340px; padding: 35px; border-radius: var(--radius); position: relative; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div id="the-void">
    <div id="void-msg">DONE. GO!</div>
    <div id="void-time" class="void-sub"></div>
    <div style="margin-top:40px; color:#eee; font-size:0.7rem;">ALL EVIDENCE DESTROYED. DO NOT RETURN.</div>
</div>

<div class="container" id="main-ui">
    <header>
        <h1>Ready Go</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">Destroy the evidence. Release your mind.</p>

    <div id="stage">
        <div id="init-msg" style="font-weight: 900; color: #ccc; text-align: center;">SELECT ITEMS & START</div>
    </div>

    <div class="setup-section" id="setup-area">
        <div class="preset-grid" id="presetGrid">
            <label style="cursor:pointer; background:#fff; border:2px dashed #ccc; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.4rem;" for="photo-input">📷</label>
            <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none;">
        </div>
        <button class="go-btn" id="start-btn" onclick="startRitual()">START RITUAL</button>
    </div>

    <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="hub-link" style="background:var(--accent); border:none; padding:15px; cursor:pointer;" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer>
        <span id="footer-text">No login / No tracking / No ads / Browser only</span><br>
        <a id="privacy-link" href="https://afrorakda.com/privacy/">Privacy Policy</a> / <span id="copyright">afrorakda © 2026</span><br>
        <a id="kofi-link" href="https://ko-fi.com/afrorakda" target="_blank" style="text-decoration:none;">☕️ buy me a coffee</a>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 id="modal-title" style="margin-bottom: 15px; font-weight: 900;">📱 Install</h3>
        <p id="modal-body" style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">Share > Add to Home Screen</p>
    </div>
</div>

<script>
    // 臨床プロトコル設定
    const presets = [
        {i:"🔒",l:"LOCK"},{i:"🔥",l:"GAS"},{i:"💧",l:"WATER"},{i:"🔑",l:"KEY"},{i:"🔌",l:"PLUG"},
        {i:"🪟",l:"WINDOW"},{i:"🔋",l:"POWER"},{i:"📱",l:"PHONE"},{i:"💳",l:"WALLET"},{i:"🌂",l:"UMBRELLA"}
    ];
    
    let selected = JSON.parse(localStorage.getItem('rg_erp_sel')) || ["🔒"];
    let photoItems = [];
    let activeQueue = [];
    const COOL_DOWN_MINUTES = 60; // 1時間の強制ロック

    function init() {
        checkLock();
        const grid = document.getElementById('presetGrid');
        presets.forEach(p => {
            const div = document.createElement('div');
            div.className = `preset-icon ${selected.includes(p.i) ? 'active' : ''}`;
            div.innerText = p.i;
            div.onclick = () => {
                if(selected.includes(p.i)) selected = selected.filter(x=>x!==p.i);
                else selected.push(p.i);
                div.classList.toggle('active');
                localStorage.setItem('rg_erp_sel', JSON.stringify(selected));
            };
            grid.appendChild(div);
        });
        loadFooter();
    }

    function checkLock() {
        const lockUntil = localStorage.getItem('rg_erp_lock');
        if (lockUntil && Date.now() < parseInt(lockUntil)) {
            activateVoid(new Date(parseInt(localStorage.getItem('rg_erp_time'))));
        }
    }

    document.getElementById('photo-input').onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => { photoItems.push(ev.target.result); };
        reader.readAsDataURL(file);
    };

    function startRitual() {
        activeQueue = [
            ...selected.map(s => ({v:s, l:presets.find(p=>p.i===s).l, t:'e'})),
            ...photoItems.map(p => ({v:p, l:'EVIDENCE', t:'p'}))
        ];
        if(!activeQueue.length) return;
        document.getElementById('setup-area').style.display = 'none';
        renderNext();
    }

    function renderNext() {
        const stage = document.getElementById('stage');
        if(!activeQueue.length) { finish(); return; }
        
        const item = activeQueue[0];
        stage.innerHTML = `
            <div class="ritual-card">
                <div class="visual-box">${item.t==='e'?item.v:`<img src="${item.v}">`}</div>
                <div class="label-text">${item.l}</div>
                <button class="go-btn" style="background:var(--danger);" onclick="destroy(this.parentElement)">DESTROY & EXIT</button>
            </div>
        `;
    }

    function destroy(el) {
        el.classList.add('shaking');
        if(window.navigator.vibrate) window.navigator.vibrate([50,30,50,30,100]);
        
        setTimeout(() => {
            el.style.opacity = '0';
            el.style.transform = 'scale(0.5) rotate(10deg)';
            setTimeout(() => {
                activeQueue.shift();
                renderNext();
            }, 300);
        }, 700);
    }

    function finish() {
        const now = Date.now();
        localStorage.setItem('rg_erp_lock', (now + COOL_DOWN_MINUTES * 60000).toString());
        localStorage.setItem('rg_erp_time', now.toString());
        
        // 記憶の断絶プロトコル
        photoItems = [];
        activateVoid(new Date(now));
    }

    function activateVoid(date) {
        const voidScreen = document.getElementById('the-void');
        const voidTime = document.getElementById('void-time');
        voidScreen.style.display = 'flex';
        voidTime.innerText = `COMPLETED AT ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
        
        // 背景を完全に白くし、UIを消去
        document.getElementById('main-ui').style.display = 'none';
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    // 聖域ロジック: loadFooter (削除厳禁)
    async function loadFooter() {
        try {
            const res = await fetch('footer.json');
            if (res.ok) {
                const d = await res.json();
                if (d.footerText) document.getElementById('footer-text').innerText = d.footerText;
                if (d.privacyLink) document.getElementById('privacy-link').href = d.privacyLink;
                if (d.copyright) document.getElementById('copyright').innerText = d.copyright;
                if (d.kofiText) document.getElementById('kofi-link').innerText = d.kofiText;
                if (d.modalTitle) document.getElementById('modal-title').innerText = d.modalTitle;
                if (d.modalBody) document.getElementById('modal-body').innerHTML = d.modalBody;
            }
        } catch (e) {}
    }

    init();
</script>
</body>
</html>
