<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ready Go</title>
    <style>
        :root { --main: #333; --bg: #fff; --accent: #eee; --input-bg: #fafafa; --radius: 15px; --danger: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        input { -webkit-user-select: text; user-select: text; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--main);
            display: flex; justify-content: center; min-height: 100vh;
            padding: env(safe-area-inset-top, 20px) 20px 40px; -webkit-font-smoothing: antialiased;
        }
        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 15px; }
        header { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -1.2px; }
        .hub-link { text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main); background: var(--accent); padding: 8px 14px; border-radius: var(--radius); }
        
        #stage {
            min-height: 280px; background: var(--input-bg); border-radius: var(--radius);
            display: flex; flex-wrap: wrap; align-content: center; justify-content: center;
            gap: 8px; padding: 15px; border: 2px solid var(--accent); position: relative;
        }
        .item {
            width: 85px; height: 85px; background: #fff; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.8rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative; overflow: hidden; border: 2px solid transparent; transition: opacity 0.3s;
        }
        .item.empty { background: #eee; border: 2px dashed #ccc; opacity: 0.6; }
        .item img { width: 100%; height: 100%; object-fit: cover; }
        .item-label { position: absolute; bottom: 4px; font-size: 0.5rem; font-weight: 900; color: #999; }

        .setup-section { background: var(--input-bg); border-radius: var(--radius); padding: 18px; border: 2px solid var(--accent); }
        .setup-title { font-size: 0.75rem; font-weight: 900; color: #999; margin-bottom: 12px; text-transform: uppercase; }
        
        .preset-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 15px; }
        .preset-icon {
            font-size: 1.2rem; background: #fff; border: 2px solid var(--accent);
            border-radius: 10px; padding: 8px 0; text-align: center; cursor: pointer; opacity: 0.3;
        }
        .preset-icon.active { opacity: 1; border-color: var(--main); }

        .go-btn { width: 100%; padding: 20px; background: var(--main); color: #fff; border: none; border-radius: var(--radius); font-size: 1.1rem; font-weight: 900; cursor: pointer; }
        .go-btn:disabled { opacity: 0.2; }

        .footer-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 5px; }
        .kofi-btn { background: var(--main); color: #fff; text-decoration: none; padding: 16px; border-radius: var(--radius); text-align: center; font-weight: 900; font-size: 0.9rem; -webkit-text-fill-color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); border: none; padding: 12px; border-radius: var(--radius); font-weight: 800; font-size: 0.8rem; cursor: pointer; }

        footer { text-align: center; font-size: 0.75rem; color: #999; line-height: 1.6; font-weight: 700; margin-top: 15px; }
        footer a { color: inherit; text-decoration: underline; }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        #final-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: 900; opacity: 0; pointer-events: none; z-index: 2000; }
        #photo-input { display: none; }
        .item.exploding { animation: shake 0.1s infinite; border-color: var(--danger); }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; width: 90%; max-width: 340px; padding: 35px; border-radius: var(--radius); text-align: left; position: relative; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>
<div id="final-msg">DONE. GO!</div>

<div class="container" id="main-ui">
    <header>
        <h1>Ready Go</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>

    <div id="stage"></div>

    <div class="setup-section" id="setup">
        <p class="setup-title">1. Rituals (Capture Required)</p>
        <div id="ritual-list" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;"></div>
        
        <p class="setup-title">2. Items (Optional)</p>
        <div class="preset-grid" id="presetGrid"></div>
        
        <button class="go-btn" id="start-btn" onclick="triggerStart()" disabled>SHOOT RITUALS</button>
    </div>

    <div class="footer-btns">
        <a id="kofi-link" href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer>
        <span id="footer-text">No login / No tracking / No ads / Browser only</span><br>
        <a id="privacy-link" href="https://afrorakda.com/privacy/">Privacy Policy</a> / <span id="copyright">afrorakda © 2026</span>
    </footer>
</div>

<input type="file" id="photo-input" accept="image/*" capture="environment">

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 id="modal-title">📱 Install</h3>
        <p id="modal-body" style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">🍏 <strong>iPhone:</strong> Share > Add to Home Screen<br><br>🤖 <strong>Android:</strong> Menu (⋮) > Add to Home Screen</p>
    </div>
</div>

<script>
    const rituals = [
        { id: 'l', icon: '🔒', label: 'LOCK' },
        { id: 'f', icon: '🔥', label: 'FIRE' },
        { id: 'w', icon: '💧', label: 'WATER' },
        { id: 'w1', icon: '🪟', label: 'WIN 1' },
        { id: 'w2', icon: '🪟', label: 'WIN 2' },
        { id: 'w3', icon: '🪟', label: 'WIN 3' }
    ];
    const presets = ["🔑", "📱", "🪪", "🎧", "⌚️", "💳", "🔋", "💊", "🌂", "👜"];
    
    let selectedPresets = JSON.parse(localStorage.getItem('rg_v5_sel')) || ["🔑", "📱"];
    let sessionPhotos = JSON.parse(localStorage.getItem('rg_v5_photos') || '{}');
    const today = new Date().toDateString();
    if (localStorage.getItem('rg_v5_date') !== today) { sessionPhotos = {}; localStorage.setItem('rg_v5_date', today); }

    const stage = document.getElementById('stage');
    const startBtn = document.getElementById('start-btn');
    const photoInput = document.getElementById('photo-input');
    let currentId = null;

    function init() {
        // Render Presets
        const pGrid = document.getElementById('presetGrid');
        pGrid.innerHTML = '';
        presets.forEach(p => {
            const div = document.createElement('div');
            div.className = 'preset-icon' + (selectedPresets.includes(p) ? ' active' : '');
            div.innerText = p;
            div.onclick = () => {
                if (selectedPresets.includes(p)) selectedPresets = selectedPresets.filter(i => i !== p);
                else selectedPresets.push(p);
                div.classList.toggle('active');
                localStorage.setItem('rg_v5_sel', JSON.stringify(selectedPresets));
                renderStage();
            };
            pGrid.appendChild(div);
        });
        renderStage();
        loadFooter();
    }

    function renderStage() {
        stage.innerHTML = '';
        let count = 0;
        rituals.forEach(r => {
            const div = document.createElement('div');
            div.className = 'item' + (sessionPhotos[r.id] ? '' : ' empty');
            if (sessionPhotos[r.id]) { div.innerHTML = `<img src="${sessionPhotos[r.id]}">`; count++; }
            else { div.innerHTML = `<span>${r.icon}</span><span class="item-label">${r.label}</span>`; }
            div.onclick = () => { if(!stage.classList.contains('active')) openCam(r.id); };
            stage.appendChild(div);
        });
        selectedPresets.forEach(p => {
            const div = document.createElement('div');
            div.className = 'item'; div.innerText = p;
            stage.appendChild(div);
        });
        startBtn.disabled = count < rituals.length;
    }

    function openCam(id) { currentId = id; photoInput.click(); }

    photoInput.onchange = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas'); cvs.width = 600; cvs.height = 600;
                const ctx = cvs.getContext('2d'); ctx.drawImage(img, 0, 0, 600, 600);
                ctx.fillStyle = 'rgba(255, 77, 77, 0.9)'; ctx.font = '900 40px sans-serif';
                ctx.fillText(new Date().toLocaleTimeString(), 20, 50);
                sessionPhotos[currentId] = cvs.toDataURL('image/jpeg', 0.6);
                localStorage.setItem('rg_v5_photos', JSON.stringify(sessionPhotos));
                renderStage();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    function triggerStart() {
        stage.classList.add('active');
        document.getElementById('setup').style.display = 'none';
        stage.querySelectorAll('.item').forEach(el => el.onclick = () => explode(el));
    }

    const cvs = document.getElementById('particle-canvas');
    const ctx = cvs.getContext('2d');
    let particles = [];
    function resize() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
    window.onresize = resize; resize();

    class P {
        constructor(x, y) { this.x = x; this.y = y; this.size = Math.random()*8+4; this.vX = (Math.random()-0.5)*15; this.vY = (Math.random()-0.5)*15; this.life = 1; }
        update() { this.x += this.vX; this.y += this.vY; this.life -= 0.02; }
        draw() { ctx.fillStyle = `rgba(255, 77, 77, ${this.life})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
    }

    function anim() { ctx.clearRect(0,0,cvs.width,cvs.height); particles = particles.filter(p => p.life > 0); particles.forEach(p => { p.update(); p.draw(); }); if(particles.length) requestAnimationFrame(anim); }

    function explode(el) {
        if (el.classList.contains('exploding')) return; el.classList.add('exploding');
        const r = el.getBoundingClientRect(); for(let i=0; i<30; i++) particles.push(new P(r.left+42, r.top+42));
        anim();
        setTimeout(() => { el.style.opacity = '0'; el.style.pointerEvents = 'none'; check(); }, 400);
    }

    function check() {
        if (!Array.from(stage.querySelectorAll('.item')).some(i => i.style.opacity !== '0')) {
            document.getElementById('final-msg').style.opacity = '1';
            setTimeout(() => location.reload(), 3000);
        }
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }
    async function loadFooter() {
        try {
            const response = await fetch('footer.json');
            if (response.ok) {
                const data = await response.json();
                if (data.footerText) document.getElementById('footer-text').innerText = data.footerText;
                if (data.privacyLink) document.getElementById('privacy-link').href = data.privacyLink;
                if (data.copyright) document.getElementById('copyright').innerText = data.copyright;
                if (data.kofiText) document.getElementById('kofi-link').innerText = data.kofiText;
            }
        } catch (e) {}
    }
    init();
</script>
</body>
</html>
