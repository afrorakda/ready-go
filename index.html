<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ready Go</title>
    
    <link rel="icon" href="image_45.png">
    <link rel="apple-touch-icon" href="image_45.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --danger: #ff4d4d;
        }

        /* 憲法遵守: 15px角丸 / iOS Safari対策 / 選択禁止 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: opacity 0.5s;
        }

        header { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -1.2px; }
        .hub-link { text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main); background: var(--accent); padding: 8px 14px; border-radius: var(--radius); }
        
        .subtitle { font-size: 0.85rem; color: #666; font-weight: 700; text-align: left; line-height: 1.4; }

        /* Stage Area */
        #stage {
            min-height: 320px;
            background: var(--input-bg);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            border: 2px solid var(--accent);
            position: relative;
        }

        .item-card {
            width: 100%;
            background: #fff;
            border-radius: var(--radius);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s, opacity 0.3s;
        }

        .item-visual {
            width: 120px; height: 120px;
            background: var(--input-bg);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem;
            overflow: hidden;
        }
        .item-visual img { width: 100%; height: 100%; object-fit: cover; }
        
        .item-label { font-size: 1.1rem; font-weight: 900; color: var(--main); }

        /* 破壊アニメーション */
        .exploding { animation: shake 0.1s infinite; border: 3px solid var(--danger); }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

        #final-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 20px;
            min-height: 300px;
        }
        .final-check { font-size: 4rem; color: var(--main); }
        .timestamp { font-size: 0.8rem; color: #999; font-weight: 800; }

        /* Setup Area */
        .setup-section {
            background: var(--input-bg);
            border-radius: var(--radius);
            padding: 18px;
            border: 2px solid var(--accent);
        }
        .setup-title { font-size: 0.75rem; font-weight: 900; color: #999; margin-bottom: 12px; text-transform: uppercase; }
        
        .preset-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 18px; }
        .preset-icon {
            font-size: 1.4rem; background: #fff; border: 2px solid var(--accent);
            border-radius: 10px; padding: 8px 0; text-align: center;
            cursor: pointer; opacity: 0.3; transition: 0.2s;
        }
        .preset-icon.active { opacity: 1; border-color: var(--main); }
        .camera-trigger { border: 2px dashed #bbb; opacity: 1; color: #888; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; height: 45px; background: #fff; border-radius: 10px; }

        .go-btn {
            width: 100%; padding: 20px; background: var(--main);
            color: #fff; border: none; border-radius: var(--radius);
            font-size: 1.2rem; font-weight: 900; cursor: pointer;
            -webkit-text-fill-color: #fff;
        }

        footer { text-align: center; font-size: 0.75rem; color: #999; line-height: 1.6; font-weight: 700; margin-top: 15px; }
        footer a { color: inherit; text-decoration: underline; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; width: 90%; max-width: 340px; padding: 35px; border-radius: var(--radius); position: relative; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <header>
        <h1>Ready Go</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">Complete the ritual. Destroy the memory. Release your mind.</p>

    <div id="stage">
        <div id="instruction" style="font-weight: 800; color: #bbb;">Set items and tap GO</div>
        <div id="final-screen">
            <div class="final-check">Done.</div>
            <div id="done-time" class="timestamp"></div>
            <button class="hub-link" style="margin-top:20px; border:none; cursor:pointer;" onclick="location.reload()">New Ritual</button>
        </div>
    </div>

    <div class="setup-section" id="setup-panel">
        <p class="setup-title">1. Ritual Items</p>
        <div class="preset-grid" id="presetGrid">
            <label class="camera-trigger" for="photo-input">📷</label>
            <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none;">
        </div>
        <button class="go-btn" onclick="startRitual()">START RITUAL</button>
    </div>

    <footer>
        <span id="footer-text">No login / No tracking / No ads / Browser only</span><br>
        <a id="privacy-link" href="https://afrorakda.com/privacy/">Privacy Policy</a> / <span id="copyright">afrorakda © 2026</span><br>
        <a id="kofi-link" href="https://ko-fi.com/afrorakda" target="_blank" style="text-decoration:none;">☕️ buy me a coffee</a>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 id="modal-title" style="margin-bottom: 15px; font-weight: 900;">📱 Install</h3>
        <p id="modal-body" style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">Share > Add to Home Screen</p>
    </div>
</div>

<script>
    const presets = [
        { icon: "🔒", label: "LOCK" },
        { icon: "🔥", label: "GAS" },
        { icon: "💧", label: "WATER" },
        { icon: "🔑", label: "KEY" },
        { icon: "🔌", label: "PLUG" },
        { icon: "🪟", label: "WINDOW" },
        { icon: "🔋", label: "POWER" },
        { icon: "📱", label: "PHONE" },
        { icon: "💳", label: "WALLET" },
        { icon: "🌂", label: "UMBRELLA" }
    ];

    let selected = JSON.parse(localStorage.getItem('rg_ocd_sel')) || ["🔒"];
    let photoItems = JSON.parse(localStorage.getItem('rg_ocd_photos')) || []; 
    let activeQueue = [];

    const stage = document.getElementById('stage');
    const presetGrid = document.getElementById('presetGrid');
    const photoInput = document.getElementById('photo-input');

    function init() {
        presets.forEach(p => {
            const div = document.createElement('div');
            div.className = `preset-icon ${selected.includes(p.icon) ? 'active' : ''}`;
            div.innerText = p.icon;
            div.onclick = () => {
                if (selected.includes(p.icon)) selected = selected.filter(i => i !== p.icon);
                else selected.push(p.icon);
                div.classList.toggle('active');
                localStorage.setItem('rg_ocd_sel', JSON.stringify(selected));
            };
            presetGrid.appendChild(div);
        });
        loadFooter();
    }

    photoInput.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = event => {
            photoItems.push(event.target.result);
            if (photoItems.length > 5) photoItems.shift();
            localStorage.setItem('rg_ocd_photos', JSON.stringify(photoItems));
        };
        reader.readAsDataURL(file);
    };

    function startRitual() {
        activeQueue = [
            ...selected.map(s => ({ type: 'emoji', val: s, label: presets.find(p => p.icon === s).label })),
            ...photoItems.map(p => ({ type: 'photo', val: p, label: 'EVIDENCE' }))
        ];
        if (activeQueue.length === 0) return;
        
        document.getElementById('setup-panel').style.display = 'none';
        document.getElementById('instruction').style.display = 'none';
        renderNextItem();
    }

    function renderNextItem() {
        if (activeQueue.length === 0) {
            finishRitual();
            return;
        }
        const item = activeQueue[0];
        stage.innerHTML = '';
        
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
            <div class="item-visual">${item.type === 'emoji' ? item.val : `<img src="${item.val}">`}</div>
            <div class="item-label">${item.label}</div>
            <button class="go-btn" style="margin-top:10px; background:#ff4d4d;" onclick="destroyItem(this.parentElement)">DESTROY & CONFIRM</button>
        `;
        stage.appendChild(card);
    }

    function destroyItem(el) {
        el.classList.add('exploding');
        setTimeout(() => {
            el.style.opacity = '0';
            el.style.transform = 'scale(0.8)';
            setTimeout(() => {
                activeQueue.shift();
                renderNextItem();
            }, 300);
        }, 600);
    }

    function finishRitual() {
        // 断絶プロトコル: 写真データを揮発させる
        photoItems = [];
        localStorage.setItem('rg_ocd_photos', JSON.stringify([]));
        
        const now = new Date();
        const timeStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        stage.innerHTML = '';
        const final = document.getElementById('final-screen');
        final.style.display = 'flex';
        document.getElementById('done-time').innerText = `RITUAL COMPLETED AT: ${timeStr}`;
        stage.appendChild(final);
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    async function loadFooter() {
        try {
            const res = await fetch('footer.json');
            if (res.ok) {
                const d = await res.json();
                if (d.footerText) document.getElementById('footer-text').innerText = d.footerText;
                if (d.privacyLink) document.getElementById('privacy-link').href = d.privacyLink;
                if (d.copyright) document.getElementById('copyright').innerText = d.copyright;
                if (d.kofiText) document.getElementById('kofi-link').innerText = d.kofiText;
            }
        } catch (e) {}
    }

    init();
</script>

</body>
</html>
