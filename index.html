<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ready Go</title>
    <link rel="icon" href="image_45.png">
    <link rel="apple-touch-icon" href="image_45.png">
    <style>
        :root { --main: #333; --bg: #fff; --accent: #eee; --input-bg: #fafafa; --radius: 15px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--main); margin: 0; display: flex; justify-content: center; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .container { width: 100%; max-width: 420px; padding: 40px 20px; box-sizing: border-box; text-align: center; display: flex; flex-direction: column; }
        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
        .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 20px; }
        
        /* 消去エリア */
        #stage { flex: 1; min-height: 280px; background: var(--input-bg); border-radius: var(--radius); margin-bottom: 25px; display: flex; flex-wrap: wrap; align-content: center; justify-content: center; gap: 15px; padding: 20px; position: relative; }
        .item { font-size: 2.5rem; cursor: pointer; transition: 0.2s; user-select: none; }
        .item.hidden { opacity: 0; transform: scale(0); pointer-events: none; }
        #final-msg { position: absolute; font-size: 3rem; font-weight: 900; opacity: 0; transition: 0.5s; pointer-events: none; }
        #stage.cleared #final-msg { opacity: 1; }

        /* 設定エリア */
        .setup-section { background: var(--input-bg); border-radius: var(--radius); padding: 20px; text-align: left; }
        .setup-title { font-size: 0.75rem; font-weight: 800; color: #666; margin-bottom: 12px; }
        .preset-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 15px; }
        .preset-icon { font-size: 1.4rem; background: #fff; border: 2px solid var(--accent); border-radius: 10px; padding: 8px; text-align: center; cursor: pointer; opacity: 0.3; }
        .preset-icon.active { opacity: 1; border-color: var(--main); }
        input { width: 100%; padding: 12px; border: 2px solid var(--accent); border-radius: 10px; background: #fff; font-size: 1rem; font-weight: 700; color: var(--main); margin-bottom: 10px; outline: none; -webkit-appearance: none; }
        input::placeholder { color: #bbb; font-weight: 400; }
        .go-btn { width: 100%; padding: 18px; background: var(--main); color: #fff; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 800; cursor: pointer; }

        footer { margin-top: 40px; font-size: 11px; color: #aaa; line-height: 1.8; }
        .kofi-btn { display: inline-block; background: var(--main); color: #fff; padding: 12px 25px; border-radius: var(--radius); text-decoration: none; font-weight: bold; font-size: 14px; margin-bottom: 12px; }
        .home-btn { display: block; width: 60%; margin: 0 auto; background: var(--accent); color: var(--main); border: none; padding: 10px; border-radius: var(--radius); font-weight: 700; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Ready Go</h1>
    <p class="subtitle">Clear your mind. Empty the list.</p>
    <div id="stage"><div id="final-msg">DONE. GO!</div></div>
    <div class="setup-section">
        <p class="setup-title">1. SETUP ITEMS</p>
        <div class="preset-grid" id="presetGrid"></div>
        <input type="text" id="custom1" placeholder="Custom item 1" spellcheck="false">
        <input type="text" id="custom2" placeholder="Custom item 2" spellcheck="false">
        <button class="go-btn" onclick="startReady()">READY TO GO</button>
    </div>
    <div style="margin-top:30px;"><a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕ Support me on Ko-fi</a><button class="home-btn" onclick="alert('Tap Share > Add to Home Screen')">Add to Home Screen</button></div>
    <footer><div>No login / No tracking / No ads / Browser only</div><div>Privacy Policy / afrorakda © 2026</div></footer>
</div>

<script>
    const presets = ["🔑", "📱", "🪪", "🎧", "⌚️", "🛂", "🎟️", "🔌", "💊", "💵"];
    // キー名を更新して古い undefined データを回避
    let selected = JSON.parse(localStorage.getItem('rg_v4_sel')) || ["🔑", "📱", "🪪"];
    let customItems = JSON.parse(localStorage.getItem('rg_v4_cus')) || ["", ""];

    const stage = document.getElementById('stage');
    const presetGrid = document.getElementById('presetGrid');
    const c1 = document.getElementById('custom1');
    const c2 = document.getElementById('custom2');

    function init() {
        c1.value = customItems[0] || "";
        c2.value = customItems[1] || "";
        presetGrid.innerHTML = '';
        presets.forEach(icon => {
            const div = document.createElement('div');
            div.className = `preset-icon ${selected.includes(icon) ? 'active' : ''}`;
            div.innerText = icon;
            div.onclick = () => {
                if (selected.includes(icon)) selected = selected.filter(i => i !== icon);
                else selected.push(icon);
                div.classList.toggle('active');
                localStorage.setItem('rg_v4_sel', JSON.stringify(selected));
            };
            presetGrid.appendChild(div);
        });
    }

    function startReady() {
        customItems = [c1.value || "", c2.value || ""];
        localStorage.setItem('rg_v4_cus', JSON.stringify(customItems));
        stage.classList.remove('cleared');
        // stage内の .item だけを消す（final-msgは残す）
        const oldItems = stage.querySelectorAll('.item');
        oldItems.forEach(i => i.remove());

        const items = [...selected, ...customItems.filter(i => i.trim() !== "")];
        items.forEach(text => {
            const el = document.createElement('div');
            el.className = 'item';
            if (text.length > 2) el.style.fontSize = '1.2rem';
            el.innerText = text;
            el.onclick = () => { el.classList.add('hidden'); check(); };
            el.style.transform = `rotate(${(Math.random() - 0.5) * 20}deg)`;
            stage.appendChild(el);
        });
        stage.scrollIntoView({ behavior: 'smooth' });
    }

    function check() {
        if (stage.querySelectorAll('.item:not(.hidden)').length === 0) {
            stage.classList.add('cleared');
        }
    }
    init();
</script>
</body>
</html>
