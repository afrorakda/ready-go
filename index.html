<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ready Go</title>
    <style>
        :root {
            --main: #333; --bg: #fff; --accent: #eee; --input-bg: #fafafa; --radius: 15px; --danger: #ff4d4d;
        }
        /* 憲法遵守 & スクロール復旧 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--main);
            display: flex; justify-content: center; min-height: 100vh;
            padding: 20px 20px 40px; -webkit-font-smoothing: antialiased;
        }
        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 15px; }
        header { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -1.2px; }
        .hub-link { text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main); background: var(--accent); padding: 8px 14px; border-radius: var(--radius); }
        
        #stage {
            min-height: 300px; background: var(--input-bg); border-radius: var(--radius);
            display: flex; flex-wrap: wrap; align-content: center; justify-content: center;
            gap: 10px; padding: 15px; border: 2px solid var(--accent); position: relative;
        }
        .item {
            width: 90px; height: 90px; background: #fff; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.8rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative; overflow: hidden; border: 2px solid transparent;
        }
        .item.empty { background: #eee; border: 2px dashed #ccc; }
        .item img { width: 100%; height: 100%; object-fit: cover; }
        .item-label { position: absolute; bottom: 4px; font-size: 0.6rem; font-weight: 900; color: #999; }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        #final-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; font-weight: 900; opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 2000;
        }

        .setup-section { background: var(--input-bg); border-radius: var(--radius); padding: 18px; border: 2px solid var(--accent); }
        .setup-title { font-size: 0.75rem; font-weight: 900; color: #999; margin-bottom: 12px; }
        
        .go-btn {
            width: 100%; padding: 20px; background: var(--main); color: #fff; border: none;
            border-radius: var(--radius); font-size: 1.1rem; font-weight: 900; cursor: pointer;
        }
        .go-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        footer { text-align: center; font-size: 0.75rem; color: #999; margin-top: 20px; font-weight: 700; line-height: 1.6; }
        #photo-input { display: none; }
        .item.exploding { animation: shake 0.1s infinite; border-color: var(--danger); }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(2px,2px); } 75% { transform: translate(-2px,-2px); } }
    </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>
<div id="final-msg">DONE. GO!</div>

<div class="container" id="main-ui">
    <header>
        <h1>Ready Go</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>

    <div id="stage"></div>

    <div class="setup-section" id="setup">
        <p class="setup-title">DAILY RITUALS (Capture to Start)</p>
        <button class="go-btn" id="start-btn" onclick="triggerStart()" disabled>SHOOT ALL RITUALS</button>
    </div>

    <footer>
        <span id="footer-text">No login / No tracking / No ads / Browser only</span><br>
        <a id="privacy-link" href="https://afrorakda.com/privacy/">Privacy Policy</a> / <span id="copyright">afrorakda © 2026</span>
    </footer>
</div>

<input type="file" id="photo-input" accept="image/*" capture="environment">

<script>
    const sacredItems = [
        { id: 'lock', icon: '🔒', label: 'LOCK' },
        { id: 'fire', icon: '🔥', label: 'FIRE' },
        { id: 'water', icon: '💧', label: 'WATER' },
        { id: 'win1', icon: '🪟', label: 'WINDOW 1' },
        { id: 'win2', icon: '🪟', label: 'WINDOW 2' }
    ];
    
    let sessionPhotos = JSON.parse(localStorage.getItem('rg_v4_photos') || '{}');
    const today = new Date().toDateString();
    if (localStorage.getItem('rg_v4_date') !== today) {
        sessionPhotos = {};
        localStorage.setItem('rg_v4_date', today);
    }

    const stage = document.getElementById('stage');
    const startBtn = document.getElementById('start-btn');
    const photoInput = document.getElementById('photo-input');
    let currentId = null;

    function render() {
        stage.innerHTML = '';
        let count = 0;
        sacredItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item' + (sessionPhotos[item.id] ? '' : ' empty');
            if (sessionPhotos[item.id]) {
                div.innerHTML = `<img src="${sessionPhotos[item.id]}">`;
                count++;
            } else {
                div.innerHTML = `<span>${item.icon}</span><span class="item-label">${item.label}</span>`;
            }
            div.onclick = () => { if(!stage.classList.contains('active')) openCam(item.id); };
            stage.appendChild(div);
        });
        startBtn.disabled = count < sacredItems.length;
    }

    function openCam(id) { currentId = id; photoInput.click(); }

    photoInput.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = event => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 600; canvas.height = 600;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 600, 600);
                ctx.fillStyle = 'rgba(255, 77, 77, 0.9)';
                ctx.font = '900 40px sans-serif';
                ctx.fillText(new Date().toLocaleTimeString(), 20, 50);
                sessionPhotos[currentId] = canvas.toDataURL('image/jpeg', 0.6);
                localStorage.setItem('rg_v4_photos', JSON.stringify(sessionPhotos));
                render();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function triggerStart() {
        stage.classList.add('active');
        document.getElementById('setup').style.display = 'none';
        const items = stage.querySelectorAll('.item');
        items.forEach((el, idx) => {
            el.onclick = () => explode(el);
        });
    }

    // Canvas Particle Logic
    const cvs = document.getElementById('particle-canvas');
    const ctx = cvs.getContext('2d');
    let particles = [];
    function resize() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
    window.onresize = resize; resize();

    class P {
        constructor(x, y) {
            this.x = x; this.y = y; this.size = Math.random() * 8 + 4;
            this.vX = (Math.random() - 0.5) * 12; this.vY = (Math.random() - 0.5) * 12;
            this.life = 1;
        }
        update() { this.x += this.vX; this.y += this.vY; this.life -= 0.02; }
        draw() { ctx.fillStyle = `rgba(255, 77, 77, ${this.life})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
    }

    function anim() {
        ctx.clearRect(0,0,cvs.width,cvs.height);
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        if(particles.length) requestAnimationFrame(anim);
    }

    function explode(el) {
        if (el.classList.contains('exploding')) return;
        el.classList.add('exploding');
        const rect = el.getBoundingClientRect();
        for(let i=0; i<25; i++) particles.push(new P(rect.left+45, rect.top+45));
        anim();
        setTimeout(() => { el.style.opacity = '0'; el.style.pointerEvents = 'none'; check(); }, 400);
    }

    function check() {
        const left = Array.from(stage.querySelectorAll('.item')).filter(i => i.style.opacity !== '0');
        if (left.length === 0) {
            document.getElementById('final-msg').style.opacity = '1';
            setTimeout(() => { location.reload(); }, 3000);
        }
    }

    render();
</script>
</body>
</html>
